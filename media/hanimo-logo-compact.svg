<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="hanimo">

  <!-- bee body -->
  <ellipse cx="32" cy="44" rx="18" ry="12" fill="#f5a623"/>

  <!-- single stripe (단순화) -->
  <rect x="18" y="42" width="28" height="4" rx="1" fill="#1a1410"/>

  <!-- head (cream) -->
  <circle cx="32" cy="26" r="14" fill="#f0e4d3"/>

  <!-- antennae (작게) -->
  <line x1="27" y1="14" x2="24" y2="8" stroke="#1a1410" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="14" x2="40" y2="8" stroke="#1a1410" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="23" cy="7" r="1.5" fill="#1a1410"/>
  <circle cx="41" cy="7" r="1.5" fill="#1a1410"/>

  <!-- eyes -->
  <circle cx="27" cy="26" r="2" fill="#1a1410"/>
  <circle cx="37" cy="26" r="2" fill="#1a1410"/>

  <!-- nose -->
  <ellipse cx="32" cy="32" rx="2" ry="1.5" fill="#1a1410"/>

</svg>
