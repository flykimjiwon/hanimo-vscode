  Geometric placeholder. 정식 일러스트로 교체 예정.
  Spec: docs/branding/logo-spec.md
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none" role="img" aria-label="hanimo">

  <!-- background hexagon (subtle hive cell) -->
  <polygon points="128,12 228,68 228,188 128,244 28,188 28,68" fill="#1a1410"/>
  <polygon points="128,28 213,76 213,180 128,228 43,180 43,76" fill="#1f1813"/>

  <!-- bee body (옷) — amber rounded ellipse -->
  <ellipse cx="128" cy="172" rx="64" ry="40" fill="#f5a623"/>

  <!-- bee stripes -->
  <rect x="100" y="148" width="56" height="10" rx="2" fill="#1a1410"/>
  <rect x="100" y="172" width="56" height="10" rx="2" fill="#1a1410"/>
  <rect x="100" y="196" width="56" height="6" rx="2" fill="#1a1410" opacity="0.7"/>

  <!-- amber highlight on body -->
  <ellipse cx="105" cy="158" rx="14" ry="6" fill="#ffd089" opacity="0.6"/>

  <!-- wings (translucent, behind body) — drawn before so it appears tucked -->
  <ellipse cx="80" cy="148" rx="22" ry="14" fill="#ffd089" opacity="0.5" transform="rotate(-15 80 148)"/>
  <ellipse cx="176" cy="148" rx="22" ry="14" fill="#ffd089" opacity="0.5" transform="rotate(15 176 148)"/>

  <!-- bichon head — cream circle -->
  <circle cx="128" cy="106" r="46" fill="#f0e4d3"/>

  <!-- ears (bichon's slightly droopy) -->
  <ellipse cx="86" cy="100" rx="14" ry="20" fill="#f0e4d3" transform="rotate(-25 86 100)"/>
  <ellipse cx="170" cy="100" rx="14" ry="20" fill="#f0e4d3" transform="rotate(25 170 100)"/>

  <!-- fluffy fur (soft outer ring on head) -->
  <circle cx="128" cy="106" r="48" fill="none" stroke="#f7eedf" stroke-width="2" opacity="0.6"/>

  <!-- antennae -->
  <line x1="115" y1="68" x2="108" y2="48" stroke="#1a1410" stroke-width="3" stroke-linecap="round"/>
  <line x1="141" y1="68" x2="148" y2="48" stroke="#1a1410" stroke-width="3" stroke-linecap="round"/>
  <circle cx="106" cy="46" r="4" fill="#1a1410"/>
  <circle cx="150" cy="46" r="4" fill="#1a1410"/>

  <!-- eyes -->
  <circle cx="113" cy="105" r="5" fill="#1a1410"/>
  <circle cx="143" cy="105" r="5" fill="#1a1410"/>
  <!-- eye sparkle -->
  <circle cx="115" cy="103" r="1.6" fill="#f7eedf"/>
  <circle cx="145" cy="103" r="1.6" fill="#f7eedf"/>

  <!-- nose -->
  <ellipse cx="128" cy="120" rx="5" ry="4" fill="#1a1410"/>

  <!-- mouth (slight smile) -->
  <path d="M 122 130 Q 128 134 134 130" stroke="#1a1410" stroke-width="2" stroke-linecap="round" fill="none"/>

</svg>
