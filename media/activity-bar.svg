<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" role="img" aria-label="hanimo">
  <!--
    hanimo activity-bar mark — Modol silhouette (monochrome).
    VS Code activity bar tints the icon via currentColor, so paths use
    fill="currentColor" / stroke="currentColor". The shape is a heavy
    simplification of docs/branding/assets/hanimo-logo-compact.svg.
  -->

  <!-- bee body (rounded rect) -->
  <rect x="6" y="13" width="12" height="8" rx="4" fill="currentColor" opacity="0.95"/>
  <!-- single stripe (knockout) -->
  <rect x="6" y="16" width="12" height="1.6" fill="var(--vscode-sideBar-background, #1e1e1e)"/>

  <!-- bichon head (circle) -->
  <circle cx="12" cy="9" r="5" fill="currentColor"/>

  <!-- antennae -->
  <line x1="9.6" y1="4.6" x2="8.5" y2="2.2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <line x1="14.4" y1="4.6" x2="15.5" y2="2.2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
  <circle cx="8.3" cy="2" r="0.7" fill="currentColor"/>
  <circle cx="15.7" cy="2" r="0.7" fill="currentColor"/>

  <!-- eyes (knockout dots) -->
  <circle cx="10" cy="9" r="0.9" fill="var(--vscode-sideBar-background, #1e1e1e)"/>
  <circle cx="14" cy="9" r="0.9" fill="var(--vscode-sideBar-background, #1e1e1e)"/>
</svg>
